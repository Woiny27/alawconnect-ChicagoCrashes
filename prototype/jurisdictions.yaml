        feature_service_url: https://services2.arcgis.com/qvkbeam7Wirps6zC/arcgis/rest/services/Traffic_Crashes/FeatureServer
    manual_test_seeds:
      - note: Rosa Parks Blvd fatal crash (Feb 22, 2026)
      - note: Woodward Ave and E Adams Ave two-car crash (Apr 2026)

  austin_tx:
